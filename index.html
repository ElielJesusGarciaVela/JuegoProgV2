<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Bar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="tema-default">

    <!-- P1: Título -->
    <div id="pantalla-titulo" class="pantalla activa">
        <div class="titulo-contenido">
            <div class="titulo-icono">🎮</div>
            <h1 class="titulo-principal">Game Bar</h1>
        </div>
        <p class="titulo-click">Haz click para iniciar</p>
    </div>

    <!-- P2: Modos -->
    <div id="pantalla-modos" class="pantalla">
        <div class="modos-contenido">
            <h2 class="modos-titulo">Selecciona modo de juego</h2>
            <div class="modos-selector">
                <button id="btn-modo-prev" class="flecha-modo">‹</button>
                <div class="modo-actual">
                    <span id="modo-nombre" class="modo-nombre"></span>
                    <p id="modo-descripcion" class="modo-descripcion"></p>
                </div>
                <button id="btn-modo-next" class="flecha-modo">›</button>
            </div>
            <div class="modos-indicadores" id="modos-indicadores"></div>
            <button id="btn-jugar" class="btn-jugar">Jugar</button>
        </div>
    </div>

    <!-- P3: Clásico -->
    <div id="pantalla-juego" class="pantalla">
        <div id="app">
            <header id="cabecera"><h1>⚔️ Campo de Batalla</h1><p class="subtitulo">Aliados vs Enemigos</p></header>
            <div id="panel-info">
                <div class="contador aliados"><span class="etiqueta">🟡 Aliados</span><span id="cuenta-aliados" class="valor">0</span></div>
                <div class="contador turno-info"><span class="etiqueta">Turno</span><span id="cuenta-turno" class="valor">0</span></div>
                <div class="contador enemigos"><span class="etiqueta">🔴 Enemigos</span><span id="cuenta-enemigos" class="valor">0</span></div>
            </div>
            <canvas id="tablero"></canvas>
            <div id="controles">
                <button id="btn-iniciar">▶ Iniciar</button>
                <button id="btn-pausar" disabled>⏸ Pausar</button>
                <button id="btn-reiniciar">🔄 Reiniciar</button>
                <button id="btn-menu">🏠 Menú</button>
                <label class="control-velocidad">Velocidad:<input type="range" id="rango-velocidad" min="20" max="500" value="100" step="10"><span id="texto-velocidad">100ms</span></label>
            </div>
            <div id="mensaje-final" class="oculto"></div>
        </div>
    </div>

    <!-- P4: Selección personajes -->
    <div id="pantalla-seleccion" class="pantalla">
        <div class="seleccion-contenido">
            <h2 class="seleccion-titulo">Elige tu equipo</h2>
            <p class="seleccion-sub">Selecciona hasta <strong>3</strong> guerreros</p>
            <div class="equipo-actual">
                <span class="equipo-label">Equipo:</span>
                <div id="equipo-slots" class="equipo-slots"></div>
                <span id="equipo-contador" class="equipo-contador">0 / 3</span>
            </div>
            <div id="grid-personajes" class="grid-personajes"></div>
            <div class="seleccion-acciones">
                <button id="btn-confirmar-equipo" class="btn-jugar" disabled>Confirmar equipo</button>
                <button id="btn-volver-modos" class="btn-secundario">← Volver</button>
            </div>
        </div>
    </div>

    <!-- P5: Combate -->
    <div id="pantalla-combate" class="pantalla">
        <div class="batalla-viewport" id="batalla-viewport">
            <div class="batalla-campo" id="batalla-campo">
                <!--
                    POSICIÓN DE SPRITES — editar aquí (index.html, líneas 82-97)
                    Según CombatEntityPlacement.png:
                    - Aliado 0 (trasero-izq): left:5%, top:62%
                    - Aliado 1 (centro):      left:28%, top:58%
                    - Aliado 2 (delantero):   left:15%, top:74%
                    - Enemigo (derecha):       left:72%, top:58%
                -->
                <div class="campo-actor aliado-slot" id="aliado-0" style="left:5%;top:95%">
                    <canvas class="actor-canvas"></canvas>
                    <div class="hp-bar-wrapper oculto"><img src="Assets/HPBar.png" class="hp-bar-bg"><div class="hp-bar-fill"></div><span class="hp-text">0/0</span></div>
                </div>
                <div class="campo-actor aliado-slot" id="aliado-1" style="left:28%;top:90%">
                    <canvas class="actor-canvas"></canvas>
                    <div class="hp-bar-wrapper oculto"><img src="Assets/HPBar.png" class="hp-bar-bg"><div class="hp-bar-fill"></div><span class="hp-text">0/0</span></div>
                </div>
                <div class="campo-actor aliado-slot" id="aliado-2" style="left:15%;top:92%">
                    <canvas class="actor-canvas"></canvas>
                    <div class="hp-bar-wrapper oculto"><img src="Assets/HPBar.png" class="hp-bar-bg"><div class="hp-bar-fill"></div><span class="hp-text">0/0</span></div>
                </div>
                <div class="campo-actor enemigo-slot" id="enemigo-slot" style="left:72%;top:95%">
                    <canvas class="actor-canvas"></canvas>
                    <div class="hp-bar-wrapper oculto"><img src="Assets/HPBar.png" class="hp-bar-bg"><div class="hp-bar-fill"></div><span class="hp-text">0/0</span></div>
                </div>
            </div>
        </div>

        <!-- HUD: Barra turnos (sup izq) -->
        <div class="hud-turnbar" id="hud-turnbar">
            <div class="turnbar-counter"><img src="Assets/TurnCounter.png" class="turnbar-counter-bg"><span class="turnbar-counter-text" id="turnbar-counter-text">Turno 0</span></div>
            <div class="turnbar-body"><img src="Assets/ActionBar.png" class="turnbar-body-bg"><div class="turnbar-icons" id="turnbar-icons"></div></div>
        </div>

        <!-- HUD: Pausa (sup der) -->
        <button class="hud-pause" id="hud-pause"><img src="Assets/PauseButton.png"></button>

        <!-- ActionMenu (aparece EN el campo junto al personaje activo, dentro del zoom) -->
        <div class="action-menu oculto" id="action-menu">
            <div class="action-menu-inner">
                <img src="Assets/ActionMenu.png" class="action-menu-bg">
                <span class="action-menu-name" id="action-menu-name">Nombre</span>
                <div class="action-menu-btns">
                    <button class="am-btn" id="am-atacar"><img src="Assets/BotonAtacar.png"></button>
                    <button class="am-btn" id="am-defender"><img src="Assets/BotonDefender.png"></button>
                </div>
            </div>
        </div>

        <!-- AttackMenu (reemplaza ActionMenu al pulsar Atacar) -->
        <div class="attack-menu oculto" id="attack-menu">
            <div class="attack-menu-inner">
                <img src="Assets/AttackMenu.png" class="attack-menu-bg">
                <button class="atk-volver" id="atk-volver"><img src="Assets/BotonVolver.png"></button>
                <div class="atk-grid" id="atk-grid">
                    <!-- Botones de ataque generados por JS -->
                </div>
            </div>
        </div>

        <!-- Menú pausa -->
        <div class="pause-overlay oculto" id="pause-overlay">
            <div class="pause-menu">
                <img src="Assets/Menu.png" class="pause-menu-bg">
                <div class="pause-menu-content">
                    <label class="vol-label">🔊 Volumen<input type="range" id="vol-slider" min="0" max="100" value="50" class="vol-slider"></label>
                </div>
                <div class="pause-menu-btns">
                    <button class="pause-btn" id="btn-continue"><img src="Assets/ContinueButton.png"></button>
                    <button class="pause-btn" id="btn-exit"><img src="Assets/ExitButton.png"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
